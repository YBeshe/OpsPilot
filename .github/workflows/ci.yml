name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  # Prisma CLI reads schema datasource url for validation/migrate workflows.
  DATABASE_URL: postgresql://opspilot:opspilot@127.0.0.1:5435/opspilot?schema=public

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run build
